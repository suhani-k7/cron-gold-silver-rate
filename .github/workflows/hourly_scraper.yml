name: Hourly Docker Scraper

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t gold-scraper .

      - name: Run Docker Container (single scrape)
        run: |
          docker run --rm \
            --name scraper \
            --entrypoint python \
            -e RUN_HOURLY=false \
            -e HISTORY_RETENTION_DAYS=14 \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/urls_final.xlsx:/app/urls_final.xlsx \
            gold-scraper /app/scraper.py

      - name: Commit Updated Files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f data
          git diff --cached --quiet || git commit -m "Hourly scrape update"
          git push