name: Hourly Docker Scraper

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          run: docker build --progress=plain --no-cache -t gold-scraper .

      - name: Run Docker Container
        run: |
          docker run \
            --name scraper \
            -v ${{ github.workspace }}/data:/app/data \
            gold-scraper

      - name: Commit Updated Files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data

          git diff --cached --quiet || git commit -m "Hourly scrape update"

          git push